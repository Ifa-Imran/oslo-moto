specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: OSLOToken
    network: chapel
    source:
      address: "0x7741cBCCdA576730930d4bddA5C0f769D5fC1A2E"
      abi: OSLOToken
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - SellTax
        - ProtocolStat
      abis:
        - name: OSLOToken
          file: ./abis/OSLOToken.json
      eventHandlers:
        - event: SellTaxApplied(indexed address,uint256,uint256,uint256)
          handler: handleSellTaxApplied
      file: ./src/token.ts

  - kind: ethereum
    name: OSLOInvestmentEngine
    network: chapel
    source:
      address: "0x8CBba9D00b87E8948AC8b271a73982fd1E1da13B"
      abi: OSLOInvestmentEngine
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deposit
        - User
        - Withdrawal
        - ProtocolStat
      abis:
        - name: OSLOInvestmentEngine
          file: ./abis/OSLOInvestmentEngine.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256,uint256,uint256)
          handler: handleDeposited
        - event: RewardsClaimed(indexed address,uint256,uint256,uint256)
          handler: handleRewardsClaimed
      file: ./src/investment-engine.ts

  - kind: ethereum
    name: OSLOReferral
    network: chapel
    source:
      address: "0x87Bccf752e8Af9F32AFC5E82697D6A08634393f2"
      abi: OSLOReferral
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - ReferralPayment
        - ProtocolStat
      abis:
        - name: OSLOReferral
          file: ./abis/OSLOReferral.json
      eventHandlers:
        - event: UserRegistered(indexed address,indexed address,uint256)
          handler: handleUserRegistered
        - event: LevelUnlocked(indexed address,uint256)
          handler: handleLevelUnlocked
        - event: ReferralPaid(indexed address,indexed address,uint256,uint256)
          handler: handleReferralPaid
        - event: ReferralRewardsClaimed(indexed address,uint256)
          handler: handleReferralRewardsClaimed
      file: ./src/referral.ts

  - kind: ethereum
    name: OSLORankSystem
    network: chapel
    source:
      address: "0x286167A466F82c6A1230D949E9783E12aa7c3a5B"
      abi: OSLORankSystem
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - RankAchievement
        - RankBonusClaim
        - WeeklyTurnover
        - User
      abis:
        - name: OSLORankSystem
          file: ./abis/OSLORankSystem.json
      eventHandlers:
        - event: RankAchieved(indexed address,uint256,uint256,uint256)
          handler: handleRankAchieved
        - event: RankBonusClaimed(indexed address,uint256,uint256)
          handler: handleRankBonusClaimed
        - event: TurnoverRecorded(indexed address,uint256,uint256)
          handler: handleTurnoverRecorded
      file: ./src/rank-system.ts

  - kind: ethereum
    name: OSLODAO
    network: chapel
    source:
      address: "0x5097668b611FB18cB7257a830552cCf58e032e1f"
      abi: OSLODAO
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - DAOMember
        - RoyaltyClaim
        - User
      abis:
        - name: OSLODAO
          file: ./abis/OSLODAO.json
      eventHandlers:
        - event: DAOMemberQualified(indexed address,uint256,uint256)
          handler: handleDAOMemberQualified
        - event: RoyaltyClaimed(indexed address,uint256,uint256)
          handler: handleRoyaltyClaimed
      file: ./src/dao.ts

  - kind: ethereum
    name: OSLOTreasury
    network: chapel
    source:
      address: "0x266F0004f77Fd850aA35Ff6879D70413D1A58193"
      abi: OSLOTreasury
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TreasuryDistribution
        - ProtocolStat
      abis:
        - name: OSLOTreasury
          file: ./abis/OSLOTreasury.json
      eventHandlers:
        - event: FeesReceived(uint256)
          handler: handleFeesReceived
        - event: Distributed(uint256,uint256,uint256)
          handler: handleDistributed
      file: ./src/treasury.ts

  - kind: ethereum
    name: OSLOLiquidityManager
    network: chapel
    source:
      address: "0xc88C215841B0a507dB42C390FfDb2C7bB4557812"
      abi: OSLOLiquidityManager
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - LiquidityEvent
        - BuybackBurn
      abis:
        - name: OSLOLiquidityManager
          file: ./abis/OSLOLiquidityManager.json
      eventHandlers:
        - event: LiquidityAdded(uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: BuybackBurned(uint256,uint256)
          handler: handleBuybackBurned
      file: ./src/liquidity-manager.ts
